version: "3.8"

services:

  redis:
    image: redis:7
    container_name: prts-redis
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: prts-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  dynamodb:
    image: amazon/dynamodb-local
    container_name: prts-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prts-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    container_name: prts-grafana
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    restart: always

  postgres:
    image: postgres:15
    container_name: prts-postgres
    environment:
      POSTGRES_USER: prts
      POSTGRES_PASSWORD: prts123
      POSTGRES_DB: prts_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: prts-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prts.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: always

  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/services/nest-service.Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: prts-api-gateway
    environment:
      PORT: 3001
      REDIS_HOST: prts-redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/services/nest-service.Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: prts-auth-service
    environment:
      PORT: 3002
      REDIS_HOST: prts-redis
      REDIS_PORT: 6379
    ports:
      - "3002:3002"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  user-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/services/nest-service.Dockerfile
      args:
        SERVICE_NAME: user-service
    container_name: prts-user-service
    environment:
      PORT: 3003
      REDIS_HOST: prts-redis
      REDIS_PORT: 6379
    ports:
      - "3003:3003"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  tenant-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/services/nest-service.Dockerfile
      args:
        SERVICE_NAME: tenant-service
    container_name: prts-tenant-service
    environment:
      PORT: 3004
      REDIS_HOST: prts-redis
      REDIS_PORT: 6379
    ports:
      - "3004:3004"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  application-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/services/nest-service.Dockerfile
      args:
        SERVICE_NAME: application-service
    container_name: prts-application-service
    environment:
      PORT: 3005
      REDIS_HOST: prts-redis
      REDIS_PORT: 6379
    ports:
      - "3005:3005"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  notification-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/services/nest-service.Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: prts-notification-service
    environment:
      PORT: 3006
      REDIS_HOST: prts-redis
      REDIS_PORT: 6379
    ports:
      - "3006:3006"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

volumes:
  postgres_data: